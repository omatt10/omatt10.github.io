<!DOCTYPE html>
<html> 
    <head> 
        <title> Assignment 9</title>
        <link href="https://w3schools.com/w3css/4/w3.css">
        <link rel="stylesheet" href="styles.css"> 
    </head>
    <body> 
        <h1>Assignment 9: Music Gallery</h1>
        <h2>Music Time</h2>
        <div class="music-container" id="musicGallery"></div>
        <!-- Modal -->
        <div id="musicModal" class="modal w3-modal">
            <div class="modal-inner w3-modal-content">
                <!-- Left: YouTube embed -->
                <div class="modal-left">
                    <iframe id="modalYT"
                        width="100%" height="100%"
                        allow="accelerometer; autoplay; clipboard-write;
                               encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>
                </div>
                <!-- Right: Song info -->
                <div class="modal-right">
                    <span id="closeModal" class="close-btn">&times;</span>
                    <h3 id="modalTitle"></h3>
                    <p id="modalArtist"></p>
                    <p id="modalAlbumYear"></p>
                    <p id="modalGenre"></p>
                </div>
            </div>
        </div>
        <script src="js/script.js"></script>
    </body>
    <footer> 
        <p>&copy2026 Olivia Matthews </p>
    </footer>
</html>
